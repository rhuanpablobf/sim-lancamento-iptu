version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iptu_postgres
    restart: always
    shm_size: '1gb'
    environment:
      POSTGRES_USER: iptu_user
      POSTGRES_PASSWORD: iptu_password
      POSTGRES_DB: lancamento-iptu
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # - ./dadosCru:/dadosCru
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iptu_user -d lancamento-iptu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iptu_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: iptu_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://iptu_user:iptu_password@db:5432/lancamento-iptu
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PATH=/data
      - CLICKHOUSE_HOST=iptu_clickhouse
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=iptu_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
#    volumes:
#      - ./backend:/app
#      - ./dados_iptu:/data

  worker:
    build:
      context: ./backend
    container_name: iptu_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://iptu_user:iptu_password@db:5432/lancamento-iptu
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PATH=/data
      - CLICKHOUSE_HOST=iptu_clickhouse
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=iptu_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
#    volumes:
#      - ./backend:/app
#      - ./dados_iptu:/data

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: iptu_frontend
    restart: always
    command: npm run dev
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
#    volumes:
#      - ./frontend:/app
#      - /app/node_modules
#      - /app/.next

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iptu_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - db

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: iptu_clickhouse
    restart: always
    ports:
      - "8124:8123"
      - "9001:9000"
    environment:
      - CLICKHOUSE_DB=lancamento_iptu
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=iptu_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  postgres_data:
  clickhouse_data:
