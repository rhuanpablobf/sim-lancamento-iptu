version: '3.8'

services:
  redis_prod:
    image: redis:7-alpine
    container_name: iptu_redis_prod
    restart: always
    networks:
      - net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_prod:
    build:
      context: ./backend
    container_name: iptu_backend_prod
    restart: always
    expose:
      - "8000"
    ports:
      - "8005:8000"
    env_file:
      - .env.prod
    networks:
      - net
    depends_on:
      redis_prod:
        condition: service_healthy

  worker_prod:
    build:
      context: ./backend
    container_name: iptu_worker_prod
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env.prod
    networks:
      - net
    depends_on:
      redis_prod:
        condition: service_healthy

  frontend_prod:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://api-laniptu.geredados.com.br
    container_name: iptu_frontend_prod
    restart: always
    # Em produção usamos build e start
    command: sh -c "npm run build && npm run start"
    expose:
      - "3000"
    ports:
      - "3005:3000"
    env_file:
      - .env.prod
    networks:
      - net
    depends_on:
      - backend_prod

networks:
  net:
    external: true
