version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: iptu_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/rhuanpablobf/sim-lancamento-iptu-backend:latest
    container_name: iptu_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # AJUSTE O HOST ABAIXO (atualmente localhost ou IP da VPS)
      - DATABASE_URL=postgresql://rhuanpablobf%40gmail.com:15Rhu%40np%40blo@10.0.1.177:5432/lancamento-iptu
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PATH=/data
    volumes:
      - /opt/dados_iptu:/data
    depends_on:
      - redis

  worker:
    image: ghcr.io/rhuanpablobf/sim-lancamento-iptu-backend:latest
    container_name: iptu_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://rhuanpablobf%40gmail.com:15Rhu%40np%40blo@10.0.1.177:5432/lancamento-iptu
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PATH=/data
    volumes:
      - /opt/dados_iptu:/data
    depends_on:
      - redis

  frontend:
    image: ghcr.io/rhuanpablobf/sim-lancamento-iptu-frontend:latest
    container_name: iptu_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api-laniptu.geredados.com.br
    depends_on:
      - backend

volumes:
  postgres_data:
