version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iptu_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-iptu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iptu_password}
      POSTGRES_DB: ${DB_NAME:-lancamento-iptu}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iptu_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/rhuanpablobf/sim-lancamento-iptu-backend:latest
    container_name: iptu_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-iptu_user}:${DB_PASSWORD:-iptu_password}@db:5432/${DB_NAME:-lancamento-iptu}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PATH=/data
    volumes:
      - /opt/dados_iptu:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/rhuanpablobf/sim-lancamento-iptu-backend:latest
    container_name: iptu_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-iptu_user}:${DB_PASSWORD:-iptu_password}@db:5432/${DB_NAME:-lancamento-iptu}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PATH=/data
    volumes:
      - /opt/dados_iptu:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/rhuanpablobf/sim-lancamento-iptu-frontend:latest
    container_name: iptu_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api-laniptu.geredados.com.br
    depends_on:
      - backend

volumes:
  postgres_data:
